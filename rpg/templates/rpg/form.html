{% extends "website/modelo.html" %}

{% load static %}
{% load crispy_forms_tags %}

{% block hero %}
{% endblock hero %}

{% block conteudo %}
<section class="py-5 py-lg-6 bg-surface">
  <div class="container">
    <h3>{{ titulo }}</h3>

    <form method="post">

        {% csrf_token %}

        {{ form|crispy}}

        {% if botao == "Sim, exlcuir!" %}

            <h4>Deseja exlucir esse item?<h4/>
            
            <div class ="alert alert-danger" role="alert">
                {{object}}
            </div>


            <button type="submit" class="btn btn-danger">
                {{ botao }}
            </button>
        {% else %}
            <button type="submit" class="btn btn-primary">
                {{ botao }}
            </button>
        
    </form>

  </div>
</section>
{% endblock conteudo %}
